language: ja-JP

reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_placeholder: "@coderabbitai summary"
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false
    ignore_title_keywords:
      - "WIP"
  finishing_touches:
    docstrings:
      enabled: true
    unit_tests:
      enabled: true
  pre_merge_checks:
    title:
      mode: error
      requirements: "rabbit-javaのprefixがついていること"
    custom_checks:
      - name: "テストコードの確認"
        mode: error
        instructions: "新規関数にはユニットテストが必ず存在すること"

knowledge_base:
  learnings:
    scope: local
  code_guidelines:
    enabled: true
    filePatterns:
      - "ADR/*.md"
chat:
  auto_reply: true
