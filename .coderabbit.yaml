language: ja-JP

reviews:
  profile: "assertive"
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_placeholder: "@coderabbitai summary"
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false
    ignore_title_keywords:
      - "WIP"
  finishing_touches:
    docstrings:
      enabled: true
    unit_tests:
      enabled: true

  pre_merge_checks:
    title:
      mode: error
      requirements: "rabbit-javaのprefixがついていること"
    custom_checks:
      - name: "テストコードの確認"
        mode: error
        instructions: "新規関数にはユニットテストが必ず存在すること"
      - name: ADR準拠チェック
        mode: error   # warning にすると警告のみ、error にするとマージをブロック
        instructions: |
          ADR/ディレクトリ配下のADRに抵触する変更が含まれていないか確認してください。
          以下の観点でチェックしてください：
          - ADRで定められたアーキテクチャパターンに従っているか
          - ADRで禁止されている実装方法を使用していないか
          - ADRで定義された命名規則・パッケージ構成に従っているか
          違反がある場合はFAILとし、具体的な違反内容とADR番号を明記してください。
  path_instructions:
    - path: "**/*.java"
      instructions: |
        ADR/ディレクトリ配下のADR（アーキテクチャ決定記録）に抵触していないか確認してください。
        ADRで定められた設計方針・命名規則・禁止事項に違反している場合は必ず指摘してください。

knowledge_base:
  learnings:
    scope: local
  code_guidelines:
    filePatterns:
      - "**/ADR/*.md"
chat:
  auto_reply: true
