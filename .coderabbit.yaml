language: ja-JP

reviews:
  profile: "assertive"
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_placeholder: "@coderabbitai summary"
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false
    ignore_title_keywords:
      - "WIP"
  finishing_touches:
    docstrings:
      enabled: true
    unit_tests:
      enabled: true
  instructions: |
    このプロジェクトのレビュー時は以下の観点を重視してください:

    ## アーキテクチャ（ADR-001）
    - Controller → Service → Repository の3層アーキテクチャに従っているか
    - Controller が Repository を直接参照していないか

    ## パッケージ構成（ADR-002）
    - パッケージ構成がドメイン単位になっているか
    - 他ドメインの dto / entity を直接参照していないか

    ## Lombok（ADR-003）
    - Lombok は @Getter / @Setter / @Builder / @RequiredArgsConstructor のみ使用しているか
    - @Data / @Value / @AllArgsConstructor は使用していないか

    ## テスト（ADR-004）
    - クラスに対応するテストクラスが作成されているか
    - テストフレームワークは JUnit 5、モックは Mockito を使用しているか
    - Controller のテストは MockMvc スタンドアロンテストになっているか
    - Service のテストは実クラスを直接インスタンス化しているか
    - テストの網羅性は十分か

    ## DTO（ADR-005）
    - Entity を Controller 層に直接返却・参照していないか
    - リクエストは *Request、レスポンスは *Response DTO を使用しているか
    - Entity から DTO への変換は Service 層で行っているか

    ## バリデーション（ADR-006）
    - リクエスト DTO に Bean Validation アノテーションが付与されているか
    - Controller で @Valid と BindingResult を使用しているか
    - バリデーションエラー時に 400 Bad Request を返しているか
    - ビジネスルールの検証は Service 層で IllegalArgumentException をスローしているか

    ## セキュリティ
    - SQL インジェクション、XSS などの脆弱性がないか
    - 認証・認可の漏れがないか

  pre_merge_checks:
    title:
      mode: error
      requirements: "rabbit-javaのprefixがついていること"
    custom_checks:
      - name: "テストコードの確認"
        mode: error
        instructions: "新規関数にはユニットテストが必ず存在すること"

knowledge_base:
  learnings:
    scope: local
  code_guidelines:
    filePatterns:
      - "**/ADR/*.md"
chat:
  auto_reply: true
