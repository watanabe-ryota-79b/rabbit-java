# CodeRabbit 設定ファイル
# ドキュメント: https://docs.coderabbit.ai/configure/overview

language: ja-JP

reviews:
  auto_review:
    enabled: true
    drafts: false

  profile: chill

  path_filters:
    - "!**/*.md"
    - "!**/gradlew"
    - "!**/gradlew.bat"
    - "!**/.gradle/**"
    - "!**/build/**"

  poem: false
  summary: true
  summary_walkthrough: true
  collapse_walkthrough: false

  instructions: |
    このプロジェクトのレビュー時は以下の観点を重視してください:

    ## アーキテクチャ
    - Spring の3層アーキテクチャ（Controller → Service → Repository）に従っているか
    - パッケージ構成がドメイン単位になっているか

    ## コーディング規約
    - Lombok は @Getter / @Builder のみ使用しているか（@Data 等は使わない）
    - 新しいクラスに対応するテストクラスが作成されているか

    ## セキュリティ
    - SQL インジェクション、XSS などの脆弱性がないか
    - 認証・認可の漏れがないか

    ## テスト
    - JUnit 5 を使用しているか
    - テストの網羅性は十分か

chat:
  auto_reply: true
